name: Build iOS App
on:
  push:
      branches: ["main"]
        workflow_dispatch:
        jobs:
          build:
              runs-on: macos-latest
                  steps:
                      - name: Checkout
                            uses: actions/checkout@v4
                                - name: Xcode
                                      uses: maxim-lobanov/setup-xcode@v1
                                            with:
                                                    xcode-version: latest
                                                        - name: Build
                                                              run: xcodebuild -project samples/CameraAccess/CameraAccess.xcodeproj -scheme CameraAccess -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
                                                                  - name: Upload
                                                                        uses: actions/upload-artifact@v4
                                                                              with:
                                                                                      name: VisionClaw-IPA
                                                                                              path: samples/CameraAccess/build/Release-iphoneos/*.app
                                                                                              
